# =============================================
# SWAG Config - Root Domain
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name kenitemr.com www.kenitemr.com;
    return 301 https://kenitemr.com$request_uri;
}

server {
    # === TCP + HTTP/2 ===
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # === QUIC / HTTP/3 (UDP) ===
    listen 443 quic;
    listen [::]:443 quic;

    server_name kenitemr.com www.kenitemr.com;

    # SWAG SSL & Common Proxy Settings
    include /config/nginx/ssl.conf;
    include /config/nginx/proxy.conf;
    include /config/nginx/resolver.conf;

    # HTTP/3 Advertisement
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # =============================================
    # Security Headers (Applied at Edge - Best Practice)
    # =============================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # =============================================
    # Main SPA Location (Frontend Nginx Container)
    # =============================================
    location / {
        set $upstream_app frontend;
        set $upstream_port 80;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # =============================================
    # API Proxy
    # =============================================
    location /api/ {
        set $upstream_app backend;
        set $upstream_port 5000;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # =============================================
    # Uploads Proxy (Radiology images, etc.)
    # =============================================
    location /uploads/ {
        set $upstream_app backend;
        set $upstream_port 5000;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        client_max_body_size 50M;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        access_log off;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}