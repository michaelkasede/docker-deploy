# =============================================
# SWAG Config - Portainer Dashboard
# dash.kenitemr.com
# Updated for Portainer CE default (9443 HTTPS)
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name dash.kenitemr.com;

    # Redirect all HTTP to HTTPS
    return 301 https://dash.kenitemr.com$request_uri;
}

server {
    # === TCP + HTTP/2 ===
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    # === QUIC / HTTP/3 ===
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;

    server_name dash.kenitemr.com;

    # SWAG SSL & Common Settings
    include /config/nginx/ssl.conf;
    include /config/nginx/proxy.conf;

    # HTTP/3 Advertisement
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # =============================================
    # Security Headers (Strict for Admin Interface)
    # =============================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss:; frame-ancestors 'none';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # =============================================
    # Portainer Proxy - Using Correct Port 9443
    # =============================================
    location / {
        set $upstream_app portainer;
        set $upstream_port 9443;          # ← Correct default HTTPS port
        set $upstream_proto http;         # Internal traffic is still HTTP (SSL terminated by SWAG)

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Critical WebSocket support for Portainer (terminal, console, logs, etc.)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeouts for heavy operations
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 600s;

        # Allow large payloads (stack imports, etc.)
        client_max_body_size 100M;
    }

    # Explicit WebSocket route (extra safety)
    location /api/websocket/ {
        set $upstream_app portainer;
        set $upstream_port 9443;
        set $upstream_proto http;

        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        return 200 "healthy\n";
        access_log off;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}